services:
  music-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bytedo/music-api:latest
    container_name: music-api
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
      - HOST=0.0.0.0
      - ENABLE_DOWNLOAD=${ENABLE_DOWNLOAD:-1}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - API_KEY=${API_KEY:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
